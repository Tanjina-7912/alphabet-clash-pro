<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- daigyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- custom css -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="font-poppins">
    <main class="bg-[#010313] min-h-screen bg-[url(images/background.png)] bg-no-repeat bg-center">
        <section class="home min-h-screen text-white anton-regular flex justify-center items-center hidden ">
            <div class="flex flex-col items-center gap-10">
                <h1 class="text-8xl">ALPHA CLASH PRO</h1>
                <p>Unleash your Keyboard kun g fu : press "Enter" to Play</p>
                <button class="btn bg-white text-black">Play Now</button>
            </div>
        </section>
        <!-- play ground -->
        <section class="play-ground hidden">
            <div>
                <!-- screen -->
 <div class="mockup-window  border-[20px]  w-400 rounded-2xl border-[#010313CC] bg-[#FFFFFFB3]">
  <div class="grid border-base-300 h-80 "></div>
</div>
                <!-- keyboard  start-->
                <div>
                    <div class="my-1 flex w-full justify-center gap-1">
                        <kbd class="kbd">q</kbd>
                        <kbd class="kbd">w</kbd>
                        <kbd class="kbd">e</kbd>
                        <kbd class="kbd">r</kbd>
                        <kbd class="kbd">t</kbd>
                        <kbd class="kbd">y</kbd>
                        <kbd class="kbd">u</kbd>
                        <kbd class="kbd">i</kbd>
                        <kbd class="kbd">o</kbd>
                        <kbd class="kbd">p</kbd>
                    </div>
                    <div class="my-1 flex w-full justify-center gap-1">
                        <kbd class="kbd">a</kbd>
                        <kbd class="kbd">s</kbd>
                        <kbd class="kbd">d</kbd>
                        <kbd class="kbd">f</kbd>
                        <kbd class="kbd">g</kbd>
                        <kbd class="kbd">h</kbd>
                        <kbd class="kbd">j</kbd>
                        <kbd class="kbd">k</kbd>
                        <kbd class="kbd">l</kbd>
                    </div>
                    <div class="my-1 flex w-full justify-center gap-1">
                        <kbd class="kbd">z</kbd>
                        <kbd class="kbd">x</kbd>
                        <kbd class="kbd">c</kbd>
                        <kbd class="kbd">v</kbd>
                        <kbd class="kbd">b</kbd>
                        <kbd class="kbd">n</kbd>
                        <kbd class="kbd">m</kbd>
                        <kbd class="kbd">/</kbd>
                    </div>
                </div>
                <!-- keyboard  end-->

                <!-- life score-->
            </div>
        </section>
        <!-- play ground end -->
        <section class="score  flex justify-center items-center min-h-screen hidden">
<div class="text-white text-center space-y-6 bg-[#FFFFFF33] p-4 rounded-lg">
    <h1 class="text-8xl"> 
<span class="font-extrabold">Score :</span>
<span>14</span>
    </h1>
    <button class="btn">Play Again</button>
    <p>practice will make you a pro</p>
</div>
        </section>
    </main>
</body>

</html>
